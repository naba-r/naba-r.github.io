{{ if or .IsHome .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ if .IsHome }}WebSite{{ else }}BlogPosting{{ end }}",
  {{ if .IsHome }}
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}"
  {{ else }}
  "headline": "{{ .Title | plainify }}",
  "description": "{{ .Description | plainify }}",
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Params.author | default "نَــبَــرَ" }}"
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ if .Lastmod }}{{ .Lastmod.Format "2006-01-02" }}{{ else }}{{ .Date.Format "2006-01-02" }}{{ end }}",
  "url": "{{ .Permalink }}"
  {{ end }}
}
</script>
{{ end }}
